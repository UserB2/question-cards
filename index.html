<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>질문 나눔 카드</title>
  <meta name="description" content="모임에서 서로를 알아가는 질문 카드 뽑기" />
  <link rel="stylesheet" href="style.css?v=3" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>" />
</head>
<body>

<div class="app">
  <!-- ═══════════ 사이드바 ═══════════ -->
  <nav id="sidebar" aria-label="메뉴">
    <div class="brand" title="질문 나눔 카드">
      <span class="brand-emoji">🃏</span>
      <span class="brand-name">질문 나눔<br />카드</span>
    </div>
    <button type="button" class="nav-btn active" data-view="cards">
      <span class="nav-icon">🃏</span><span class="nav-label">카드</span>
    </button>
    <button type="button" class="nav-btn" data-view="roulette">
      <span class="nav-icon">🎯</span><span class="nav-label">룰렛</span>
    </button>
    <button type="button" class="nav-btn" data-view="people">
      <span class="nav-icon">👥</span><span class="nav-label">참석자</span>
    </button>
    <button type="button" class="nav-btn" data-view="settings">
      <span class="nav-icon">⚙️</span><span class="nav-label">설정</span>
    </button>
  </nav>

  <main id="content">

    <!-- ═══════════ 뷰 1: 카드 뽑기 (카드에만 집중) ═══════════ -->
    <section class="view view-cards" data-view="cards">
      <header class="view-top">
        <button id="filter-summary" type="button" class="pill-btn" title="필터 바꾸기"></button>
        <span id="remaining-badge" class="badge" title="남은 카드"></span>
      </header>

      <div id="card-stage">
        <div id="card" hidden>
          <div class="card-face card-back-face">
            <div class="card-back-pattern"></div>
            <span class="card-back-theme"></span>
            <small class="card-back-hint">카드를 탭해서 뒤집기</small>
          </div>
          <div class="card-face card-front">
            <div class="card-labels">
              <span class="label-type"></span>
              <span class="label-depth"></span>
            </div>
            <p class="card-question"></p>
            <span class="card-theme-name"></span>
          </div>
        </div>

        <div id="empty-state" hidden>
          <p class="empty-emoji">🎉</p>
          <p>카드를 다 뽑았어요!</p>
          <div class="empty-actions">
            <button id="empty-reset" type="button" class="primary-btn">처음부터 다시</button>
            <button id="empty-setup" type="button" class="ghost-btn">조건 바꾸기</button>
          </div>
        </div>

        <p id="stage-hint" class="stage-hint">아래 카드 더미를 탭해서 카드를 뽑아 보세요 👇</p>
      </div>

      <div class="card-actions">
        <button id="go-roulette" type="button" class="ghost-btn" hidden>🎯 누가 답할까?</button>
        <button id="next-card" type="button" class="ghost-btn" hidden>다음 카드 ↑</button>
      </div>

      <div id="deck-pile" title="카드 뽑기">
        <div class="pile-card"></div>
        <div class="pile-card"></div>
        <div class="pile-card"></div>
        <div class="pile-card"></div>
        <div class="pile-card"></div>
        <div class="pile-card"></div>
        <div class="pile-card pile-top"></div>
      </div>
    </section>

    <!-- ═══════════ 뷰 2: 룰렛 (룰렛에만 집중) ═══════════ -->
    <section class="view view-roulette" data-view="roulette" hidden>
      <header class="view-top">
        <button id="manage-people" type="button" class="pill-btn">👥 참석자 등록하기</button>
      </header>

      <div class="roulette-center">
        <div id="roulette-empty" class="view-empty" hidden>
          <p class="empty-emoji">👥</p>
          <p>참석자를 먼저 등록해 주세요</p>
          <button id="go-people" type="button" class="primary-btn">참석자 등록하기</button>
        </div>

        <div id="spinner-wrap" hidden>
          <div id="winner-label"></div>
          <div class="spinner-pointer">▼</div>
          <div id="spinner-circle"></div>
          <button id="spin-btn" type="button" class="primary-btn big">🎯 스핀!</button>
          <button id="go-cards" type="button" class="ghost-btn">🃏 카드 뽑으러 가기</button>
        </div>
      </div>
    </section>

    <!-- ═══════════ 뷰 3: 참석자 ═══════════ -->
    <section class="view view-people" data-view="people" hidden>
      <div class="panel">
        <h2>👥 참석자</h2>
        <p class="hint-text">참석자를 등록하면 룰렛으로 답할 사람을 뽑아 드려요.</p>
        <div class="attendee-form">
          <input id="attendee-name" type="text" placeholder="참석자 이름" maxlength="12" autocomplete="off" />
          <button id="add-attendee" type="button" class="primary-btn small">추가</button>
        </div>
        <ul id="attendee-list"></ul>
        <label class="toggle-row small">
          <input type="checkbox" id="fair-toggle" checked />
          <span>공정 모드 <small>(전원이 한 번씩 걸릴 때까지 중복 없음)</small></span>
        </label>
        <button id="people-to-roulette" type="button" class="primary-btn">🎯 룰렛 돌리러 가기</button>
      </div>
    </section>

    <!-- ═══════════ 뷰 4: 설정 (필터) ═══════════ -->
    <section class="view view-settings" data-view="settings" hidden>
      <div class="panel">
        <h2>⚙️ 설정</h2>

        <fieldset class="filter-group">
          <legend>테마</legend>
          <div id="theme-chips" class="chips"></div>
        </fieldset>

        <fieldset class="filter-group">
          <legend>질문 유형</legend>
          <div id="type-chips" class="chips"></div>
        </fieldset>

        <fieldset class="filter-group">
          <legend>깊이</legend>
          <div id="depth-chips" class="chips depth-chips"></div>
        </fieldset>

        <p id="pool-count" class="pool-count"></p>

        <div class="setup-options">
          <label class="toggle-row">
            <input type="checkbox" id="exclude-toggle" checked />
            <span>뽑은 카드 제외 <small>(뽑은 카드는 다시 나오지 않아요 — 다음 모임에도 기억됩니다)</small></span>
          </label>
          <button id="reset-drawn" type="button" class="ghost-btn">🔄 처음부터 다시 (뽑은 기록 초기화)</button>
        </div>

        <button id="settings-to-cards" type="button" class="primary-btn">🃏 카드 뽑으러 가기</button>

        <p class="classic-link"><a href="classic/">이전 버전(클래식 UI) 열기 →</a></p>
      </div>
    </section>

  </main>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="spinner.js"></script>
</body>
</html>
